---
- name: Deploy LobeChat
  hosts: lobechat
  become: true
  vars:
    db_password: "lobechat-db-password"
    minio_password: "lobechat-minio-secret"
    lobechat_user: ubuntu
    lobechat_dir: /opt/lobechat
    minio_data_dir: /opt/minio/data

  tasks:
    # System Setup
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - git
          - build-essential
          - unzip
          - wget
          - curl
          - gnupg
        state: present

    # PostgreSQL 16
    - name: Add PostgreSQL apt key
      ansible.builtin.apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Add PostgreSQL repository
      ansible.builtin.apt_repository:
        repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        state: present

    - name: Install PostgreSQL 16 with pgvector
      ansible.builtin.apt:
        name:
          - postgresql-16
          - postgresql-contrib-16
          - postgresql-16-pgvector
        state: present
        update_cache: true

    - name: Start and enable PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: started
        enabled: true

    - name: Configure PostgreSQL (password, database, pgvector)
      ansible.builtin.shell: |
        sudo -u postgres psql << 'EOSQL'
        ALTER USER postgres WITH PASSWORD '{{ db_password }}';
        CREATE DATABASE lobechat;
        \c lobechat
        CREATE EXTENSION IF NOT EXISTS vector;
        EOSQL
      args:
        executable: /bin/bash
      changed_when: true

    # MinIO
    - name: Download MinIO server
      ansible.builtin.get_url:
        url: https://dl.min.io/server/minio/release/linux-amd64/minio
        dest: /usr/local/bin/minio
        mode: '0755'

    - name: Create MinIO data directory
      ansible.builtin.file:
        path: "{{ minio_data_dir }}"
        state: directory
        owner: "{{ lobechat_user }}"
        group: "{{ lobechat_user }}"
        mode: '0755'

    - name: Create MinIO systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/minio.service
        content: |
          [Unit]
          Description=MinIO Object Storage
          After=network.target

          [Service]
          Type=simple
          User={{ lobechat_user }}
          Environment="MINIO_ROOT_USER=lobechat"
          Environment="MINIO_ROOT_PASSWORD={{ minio_password }}"
          ExecStart=/usr/local/bin/minio server {{ minio_data_dir }} --console-address ":9001" --address ":9000"
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Restart MinIO

    - name: Start and enable MinIO
      ansible.builtin.systemd:
        name: minio
        state: started
        enabled: true
        daemon_reload: true

    - name: Download MinIO client
      ansible.builtin.get_url:
        url: https://dl.min.io/client/mc/release/linux-amd64/mc
        dest: /usr/local/bin/mc
        mode: '0755'

    - name: Wait for MinIO to be ready
      ansible.builtin.wait_for:
        port: 9000
        delay: 5
        timeout: 60

    - name: Configure MinIO alias
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.command:
        cmd: mc alias set local http://localhost:9000 lobechat {{ minio_password }}
        creates: "/home/{{ lobechat_user }}/.mc/config.json"

    - name: Create MinIO bucket
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          mc mb local/lobechat --ignore-existing
          mc anonymous set download local/lobechat
        executable: /bin/bash
      changed_when: false

    # Node.js
    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add NodeSource apt key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: '0644'

    - name: Add NodeSource repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_20.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Install pnpm globally
      ansible.builtin.command:
        cmd: npm install -g pnpm
        creates: /usr/bin/pnpm

    # Bun
    - name: Download bun installer
      ansible.builtin.get_url:
        url: https://bun.sh/install
        dest: /tmp/bun-install.sh
        mode: '0755'

    - name: Install bun
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.command:
        cmd: bash /tmp/bun-install.sh
        creates: "/home/{{ lobechat_user }}/.bun/bin/bun"

    - name: Create bun symlinks
      ansible.builtin.file:
        src: "/home/{{ lobechat_user }}/.bun/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
        force: true
      loop:
        - bun
        - bunx

    # LobeChat
    - name: Create LobeChat directory
      ansible.builtin.file:
        path: "{{ lobechat_dir }}"
        state: directory
        owner: "{{ lobechat_user }}"
        group: "{{ lobechat_user }}"
        mode: '0755'

    - name: Clone LobeChat repository
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.git:
        repo: https://github.com/lobehub/lobe-chat.git
        dest: "{{ lobechat_dir }}"
        version: main
        depth: 1
        force: true

    - name: Get EC2 public IP
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/api/token
        method: PUT
        headers:
          X-aws-ec2-metadata-token-ttl-seconds: "21600"
        return_content: true
      register: imds_token

    - name: Fetch public IP from metadata
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/meta-data/public-ipv4
        headers:
          X-aws-ec2-metadata-token: "{{ imds_token.content }}"
        return_content: true
      register: public_ip

    - name: Generate AUTH_SECRET
      ansible.builtin.command:
        cmd: openssl rand -base64 32
      register: auth_secret
      changed_when: false

    - name: Generate KEY_VAULTS_SECRET
      ansible.builtin.command:
        cmd: openssl rand -base64 32
      register: key_vaults_secret
      changed_when: false

    - name: Generate JWKS key
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.shell:
        cmd: node scripts/generate-oidc-jwk.mjs 2>/dev/null || echo ""
        chdir: "{{ lobechat_dir }}"
      register: jwks_key
      changed_when: false
      failed_when: false

    - name: Create LobeChat environment file
      ansible.builtin.copy:
        dest: "{{ lobechat_dir }}/.env"
        content: |
          APP_URL=http://{{ public_ip.content }}:3210
          DATABASE_URL=postgresql://postgres:{{ db_password }}@localhost:5432/lobechat
          DATABASE_DRIVER=node
          AUTH_SECRET={{ auth_secret.stdout }}
          AUTH_TRUST_HOST=true
          KEY_VAULTS_SECRET={{ key_vaults_secret.stdout }}
          SECURE_COOKIES=false
          S3_ACCESS_KEY_ID=lobechat
          S3_SECRET_ACCESS_KEY={{ minio_password }}
          S3_ENDPOINT=http://{{ public_ip.content }}:9000
          S3_BUCKET=lobechat
          S3_PUBLIC_DOMAIN=http://{{ public_ip.content }}:9000
          S3_ENABLE_PATH_STYLE=1
          S3_SET_ACL=0
          {% if jwks_key.stdout %}
          JWKS_KEY='{{ jwks_key.stdout }}'
          {% endif %}
        owner: "{{ lobechat_user }}"
        group: "{{ lobechat_user }}"
        mode: '0600'

    - name: Copy .env to .env.local
      ansible.builtin.copy:
        src: "{{ lobechat_dir }}/.env"
        dest: "{{ lobechat_dir }}/.env.local"
        remote_src: true
        owner: "{{ lobechat_user }}"
        group: "{{ lobechat_user }}"
        mode: '0600'

    - name: Install LobeChat dependencies
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.command:
        cmd: pnpm install
        chdir: "{{ lobechat_dir }}"
        creates: "{{ lobechat_dir }}/node_modules"

    - name: Build LobeChat
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.command:
        cmd: pnpm run build
        chdir: "{{ lobechat_dir }}"
        creates: "{{ lobechat_dir }}/.next"

    - name: Run database migrations
      become: true
      become_user: "{{ lobechat_user }}"
      ansible.builtin.command:
        cmd: bun run db:migrate
        chdir: "{{ lobechat_dir }}"
      changed_when: false

    - name: Create LobeChat systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/lobechat.service
        content: |
          [Unit]
          Description=LobeChat Application
          After=network.target postgresql.service

          [Service]
          Type=simple
          User={{ lobechat_user }}
          WorkingDirectory={{ lobechat_dir }}
          EnvironmentFile={{ lobechat_dir }}/.env.local
          Environment=NODE_ENV=production
          Environment=PORT=3210
          ExecStart=/usr/bin/pnpm start
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Restart LobeChat

    - name: Start and enable LobeChat
      ansible.builtin.systemd:
        name: lobechat
        state: started
        enabled: true
        daemon_reload: true

    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          ============================================
             INSTALLATION COMPLETE!
          ============================================

          LobeChat is now running at:
             http://{{ public_ip.content }}:3210

          MinIO Console:
             http://{{ public_ip.content }}:9001
             User: lobechat
             Password: {{ minio_password }}

          ============================================

  handlers:
    - name: Restart MinIO
      ansible.builtin.systemd:
        name: minio
        state: restarted
        daemon_reload: true

    - name: Restart LobeChat
      ansible.builtin.systemd:
        name: lobechat
        state: restarted
        daemon_reload: true
