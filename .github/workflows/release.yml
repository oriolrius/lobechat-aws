name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Run CI checks before creating release
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone LobeChat
        run: git clone --depth 1 https://github.com/lobehub/lobe-chat.git

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: lobe-chat
        run: pnpm install

      - name: Type check
        working-directory: lobe-chat
        run: pnpm type-check

      - name: Lint TypeScript
        working-directory: lobe-chat
        run: pnpm lint:ts

  # Create release only after CI passes
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: ci  # Wait for CI to pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=${{ steps.prev_tag.outputs.tag }}

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            # Generate notes from commits between tags
            git log ${PREV_TAG}..${TAG} --pretty=format:"- %s (%h)" >> release_notes.md
          else
            # First release - all commits
            git log --pretty=format:"- %s (%h)" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> release_notes.md

      - name: Create source archive
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git archive --format=zip --prefix=lobechat-aws-${TAG}/ -o lobechat-aws-${TAG}.zip HEAD
          git archive --format=tar.gz --prefix=lobechat-aws-${TAG}/ -o lobechat-aws-${TAG}.tar.gz HEAD

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            lobechat-aws-*.zip
            lobechat-aws-*.tar.gz
          generate_release_notes: false
