name: Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      instance_type:
        description: 'EC2 instance type'
        required: false
        default: 'c7a.2xlarge'
        type: choice
        options:
          - c7a.2xlarge
          - c7a.xlarge
          - t3.2xlarge
      stack_name:
        description: 'CloudFormation stack name'
        required: false
        default: 'lobechat'
  release:
    types: [published]

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-1' }}
  STACK_NAME: ${{ inputs.stack_name || 'lobechat' }}

jobs:
  validate:
    name: Validate Template
    runs-on: ubuntu-latest
    if: inputs.action != 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/cloudformation.yml

  deploy:
    name: Deploy Stack
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.action != 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if key pair exists
        id: check_key
        run: |
          if aws ec2 describe-key-pairs --key-names lobechat-key 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create key pair if needed
        if: steps.check_key.outputs.exists == 'false'
        run: |
          aws ec2 create-key-pair \
            --key-name lobechat-key \
            --query 'KeyMaterial' \
            --output text > lobechat-key.pem
          echo "::warning::New SSH key pair created. Download from AWS Console or save this key."

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation.yml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              InstanceType=${{ inputs.instance_type || 'c7a.2xlarge' }} \
              KeyPairName=lobechat-key \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: outputs
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PUBLIC_IP=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' \
            --output text)

          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| LobeChat | http://${PUBLIC_IP}:3210 |" >> $GITHUB_STEP_SUMMARY
          echo "| MinIO Console | http://${PUBLIC_IP}:9001 |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH | \`ssh -i ~/.ssh/lobechat-key.pem ubuntu@${PUBLIC_IP}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note**: LobeChat takes ~15 minutes to fully install after instance launch." >> $GITHUB_STEP_SUMMARY

  destroy:
    name: Destroy Stack
    runs-on: ubuntu-latest
    if: inputs.action == 'destroy'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete CloudFormation stack
        run: |
          aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }}
          echo "Waiting for stack deletion..."
          aws cloudformation wait stack-delete-complete --stack-name ${{ env.STACK_NAME }}
          echo "Stack deleted successfully!"

      - name: Summary
        run: |
          echo "## Stack Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CloudFormation stack \`${{ env.STACK_NAME }}\` has been deleted." >> $GITHUB_STEP_SUMMARY
