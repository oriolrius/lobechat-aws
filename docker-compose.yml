services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lobechat-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-lobechat-db-password}
      - POSTGRES_DB=lobechat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: lobechat-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-lobechat}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-lobechat-minio-secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: lobechat-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-lobechat} ${MINIO_PASSWORD:-lobechat-minio-secret};
      mc mb local/lobechat --ignore-existing;
      mc anonymous set download local/lobechat;
      echo 'MinIO bucket configured!';
      exit 0;
      "

  lobechat:
    image: ghcr.io/oriolrius/lobechat:${LOBECHAT_VERSION:-latest}
    container_name: lobechat
    ports:
      - "3210:3210"
    environment:
      - APP_URL=http://${PUBLIC_IP:-localhost}:3210
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-lobechat-db-password}@postgres:5432/lobechat
      - DATABASE_DRIVER=node
      - AUTH_SECRET=${AUTH_SECRET:-change-me-in-production}
      - AUTH_TRUST_HOST=true
      - KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET:-change-me-in-production}
      - SECURE_COOKIES=false
      - S3_ACCESS_KEY_ID=${MINIO_USER:-lobechat}
      - S3_SECRET_ACCESS_KEY=${MINIO_PASSWORD:-lobechat-minio-secret}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=lobechat
      - S3_PUBLIC_DOMAIN=http://${PUBLIC_IP:-localhost}:9000
      - S3_ENABLE_PATH_STYLE=1
      - S3_SET_ACL=0
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
